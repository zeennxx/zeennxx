<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;family=Share+Tech+Mono&amp;display=swap');

      .bg { fill: #020b18; }
      .grid-h { stroke: rgba(34,211,238,0.04); stroke-width: 1; }
      .grid-v { stroke: rgba(34,211,238,0.04); stroke-width: 1; }

      .lbl {
        font-family: 'Share Tech Mono', monospace;
        font-size: 18px;
        letter-spacing: 12px;
        fill: #22d3ee;
        text-anchor: middle;
        animation: slideUp 0.9s ease 0.4s both;
      }
      .main {
        font-family: 'Orbitron', sans-serif;
        font-size: 130px;
        font-weight: 900;
        letter-spacing: 20px;
        text-anchor: middle;
        fill: url(#textGrad);
        animation: slideUp 1s ease 0.9s both;
      }
      .sub {
        font-family: 'Orbitron', sans-serif;
        font-size: 22px;
        font-weight: 400;
        letter-spacing: 14px;
        fill: none;
        stroke: rgba(148,163,184,0.65);
        stroke-width: 0.8;
        text-anchor: middle;
        animation: slideUp 1s ease 1.5s both;
      }

      .glitch1 { fill: #ff2d55; font-family: 'Orbitron', sans-serif; font-size: 130px; font-weight: 900; letter-spacing: 20px; text-anchor: middle; }
      .glitch2 { fill: #22d3ee; font-family: 'Orbitron', sans-serif; font-size: 130px; font-weight: 900; letter-spacing: 20px; text-anchor: middle; }

      .scanline { fill: none; }

      /* letter bounce animations */
      .l1 { animation: bounce1 2.8s ease-in-out infinite; }
      .l2 { animation: bounce2 2.8s ease-in-out infinite; }
      .l3 { animation: bounce3 2.8s ease-in-out infinite; }
      .l4 { animation: bounce4 2.8s ease-in-out infinite; }
      .l5 { animation: bounce5 2.8s ease-in-out infinite; }

      .s1 { animation: bounce1 2.8s ease-in-out infinite; }
      .s2 { animation: bounce2 2.8s ease-in-out infinite; }
      .s3 { animation: bounce3 2.8s ease-in-out infinite; }
      .s4 { animation: bounce4 2.8s ease-in-out infinite; }
      .s5 { animation: bounce5 2.8s ease-in-out infinite; }
      .s6 { animation: bounce1 2.8s ease-in-out 0.4s infinite; }
      .s7 { animation: bounce2 2.8s ease-in-out 0.4s infinite; }

      @keyframes bounce1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
      @keyframes bounce2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
      @keyframes bounce3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
      @keyframes bounce4 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
      @keyframes bounce5 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

      .l1 { animation-delay: 0s; }
      .l2 { animation-delay: 0.18s; }
      .l3 { animation-delay: 0.36s; }
      .l4 { animation-delay: 0.54s; }
      .l5 { animation-delay: 0.72s; }
      .s1 { animation-delay: 0.05s; }
      .s2 { animation-delay: 0.12s; }
      .s3 { animation-delay: 0.19s; }
      .s4 { animation-delay: 0.26s; }
      .s5 { animation-delay: 0.33s; }
      .s6 { animation-delay: 0.40s; }
      .s7 { animation-delay: 0.47s; }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes glitchAnim1 {
        0%,88%,100% { opacity: 0; }
        89% { opacity: 0.6; clip-path: inset(15% 0 55% 0); transform: translateX(-5px); }
        91% { opacity: 0; }
        93% { opacity: 0.45; clip-path: inset(55% 0 20% 0); transform: translateX(5px); }
        95% { opacity: 0; }
      }
      @keyframes glitchAnim2 {
        0%,88%,100% { opacity: 0; }
        89% { opacity: 0.6; clip-path: inset(40% 0 35% 0); transform: translateX(4px); }
        91% { opacity: 0; }
        93% { opacity: 0.45; clip-path: inset(20% 0 60% 0); transform: translateX(-4px); }
        95% { opacity: 0; }
      }
      .g1anim { animation: glitchAnim1 5s infinite 2.5s; opacity: 0; }
      .g2anim { animation: glitchAnim2 5s infinite 2.5s; opacity: 0; }

      @keyframes scanAnim { 0%{transform:translateY(-10px)} 100%{transform:translateY(510px)} }
      .scan-rect { animation: scanAnim 5s linear infinite; }

      @keyframes lineGrow { from{stroke-dashoffset:400} to{stroke-dashoffset:0} }
      .divline { animation: lineGrow 1s ease 2.2s both; stroke-dasharray: 400; stroke-dashoffset: 400; }

      /* particles */
      @keyframes p1  { 0%{transform:translateY(0);opacity:0} 8%{opacity:0.55} 70%{opacity:0.55} 100%{transform:translateY(-320px);opacity:0} }
      @keyframes p2  { 0%{transform:translateY(0) translateX(0);opacity:0} 8%{opacity:0.4} 70%{opacity:0.4} 100%{transform:translateY(-320px) translateX(20px);opacity:0} }
      @keyframes p3  { 0%{transform:translateY(0) translateX(0);opacity:0} 8%{opacity:0.35} 70%{opacity:0.35} 100%{transform:translateY(-320px) translateX(-18px);opacity:0} }
      @keyframes p4  { 0%{transform:translateY(0);opacity:0} 8%{opacity:0.6} 70%{opacity:0.6} 100%{transform:translateY(-320px);opacity:0} }
      @keyframes p5  { 0%{transform:translateY(0) translateX(0);opacity:0} 8%{opacity:0.3} 70%{opacity:0.3} 100%{transform:translateY(-320px) translateX(15px);opacity:0} }
    </style>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="45%"  stop-color="#7ee8f8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(34,211,238,0)" />
      <stop offset="50%"  stop-color="rgba(34,211,238,0.07)" />
      <stop offset="100%" stop-color="rgba(34,211,238,0)" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgba(34,211,238,0)"/>
      <stop offset="50%"  stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0)"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect class="bg" width="1500" height="500"/>

  <!-- grid horizontal lines -->
  <g class="grid-h">
    <line x1="0" y1="44"  x2="1500" y2="44"/>
    <line x1="0" y1="88"  x2="1500" y2="88"/>
    <line x1="0" y1="132" x2="1500" y2="132"/>
    <line x1="0" y1="176" x2="1500" y2="176"/>
    <line x1="0" y1="220" x2="1500" y2="220"/>
    <line x1="0" y1="264" x2="1500" y2="264"/>
    <line x1="0" y1="308" x2="1500" y2="308"/>
    <line x1="0" y1="352" x2="1500" y2="352"/>
    <line x1="0" y1="396" x2="1500" y2="396"/>
    <line x1="0" y1="440" x2="1500" y2="440"/>
    <line x1="0" y1="484" x2="1500" y2="484"/>
  </g>
  <!-- grid vertical lines -->
  <g class="grid-v">
    <line x1="44"  y1="0" x2="44"  y2="500"/>
    <line x1="88"  y1="0" x2="88"  y2="500"/>
    <line x1="132" y1="0" x2="132" y2="500"/>
    <line x1="176" y1="0" x2="176" y2="500"/>
    <line x1="220" y1="0" x2="220" y2="500"/>
    <line x1="264" y1="0" x2="264" y2="500"/>
    <line x1="308" y1="0" x2="308" y2="500"/>
    <line x1="352" y1="0" x2="352" y2="500"/>
    <line x1="396" y1="0" x2="396" y2="500"/>
    <line x1="440" y1="0" x2="440" y2="500"/>
    <line x1="484" y1="0" x2="484" y2="500"/>
    <line x1="528" y1="0" x2="528" y2="500"/>
    <line x1="572" y1="0" x2="572" y2="500"/>
    <line x1="616" y1="0" x2="616" y2="500"/>
    <line x1="660" y1="0" x2="660" y2="500"/>
    <line x1="704" y1="0" x2="704" y2="500"/>
    <line x1="748" y1="0" x2="748" y2="500"/>
    <line x1="792" y1="0" x2="792" y2="500"/>
    <line x1="836" y1="0" x2="836" y2="500"/>
    <line x1="880" y1="0" x2="880" y2="500"/>
    <line x1="924" y1="0" x2="924" y2="500"/>
    <line x1="968" y1="0" x2="968" y2="500"/>
    <line x1="1012" y1="0" x2="1012" y2="500"/>
    <line x1="1056" y1="0" x2="1056" y2="500"/>
    <line x1="1100" y1="0" x2="1100" y2="500"/>
    <line x1="1144" y1="0" x2="1144" y2="500"/>
    <line x1="1188" y1="0" x2="1188" y2="500"/>
    <line x1="1232" y1="0" x2="1232" y2="500"/>
    <line x1="1276" y1="0" x2="1276" y2="500"/>
    <line x1="1320" y1="0" x2="1320" y2="500"/>
    <line x1="1364" y1="0" x2="1364" y2="500"/>
    <line x1="1408" y1="0" x2="1408" y2="500"/>
    <line x1="1452" y1="0" x2="1452" y2="500"/>
  </g>

  <!-- scanline -->
  <rect class="scan-rect" x="0" y="-10" width="1500" height="12" fill="url(#scanGrad)"/>

  <!-- PARTICLES — 65 titik tersebar -->
  <!-- grup 1: titik kecil dim banyak -->
  <circle cx="52"   cy="480" r="1.2" fill="#22d3ee" style="animation:p1 6s linear 0s infinite"/>
  <circle cx="120"  cy="470" r="1.0" fill="#7ee8f8" style="animation:p1 7s linear 0.5s infinite"/>
  <circle cx="200"  cy="490" r="1.3" fill="#22d3ee" style="animation:p2 8s linear 1s infinite"/>
  <circle cx="280"  cy="475" r="1.1" fill="#7ee8f8" style="animation:p1 6.5s linear 1.8s infinite"/>
  <circle cx="350"  cy="488" r="1.0" fill="#22d3ee" style="animation:p3 7.5s linear 0.3s infinite"/>
  <circle cx="420"  cy="478" r="1.4" fill="#7ee8f8" style="animation:p2 9s linear 2.2s infinite"/>
  <circle cx="500"  cy="492" r="1.2" fill="#22d3ee" style="animation:p1 6s linear 3s infinite"/>
  <circle cx="580"  cy="468" r="1.0" fill="#7ee8f8" style="animation:p3 7s linear 0.8s infinite"/>
  <circle cx="650"  cy="483" r="1.3" fill="#22d3ee" style="animation:p2 8.5s linear 1.5s infinite"/>
  <circle cx="720"  cy="490" r="1.1" fill="#7ee8f8" style="animation:p1 6.5s linear 4s infinite"/>
  <circle cx="800"  cy="476" r="1.2" fill="#22d3ee" style="animation:p3 7s linear 2.5s infinite"/>
  <circle cx="870"  cy="485" r="1.0" fill="#7ee8f8" style="animation:p2 9s linear 0.2s infinite"/>
  <circle cx="950"  cy="491" r="1.3" fill="#22d3ee" style="animation:p1 6s linear 3.5s infinite"/>
  <circle cx="1020" cy="472" r="1.1" fill="#7ee8f8" style="animation:p3 7.5s linear 1.2s infinite"/>
  <circle cx="1100" cy="487" r="1.2" fill="#22d3ee" style="animation:p2 8s linear 0.7s infinite"/>
  <circle cx="1180" cy="479" r="1.0" fill="#7ee8f8" style="animation:p1 6.5s linear 2.8s infinite"/>
  <circle cx="1260" cy="493" r="1.4" fill="#22d3ee" style="animation:p3 7s linear 4.5s infinite"/>
  <circle cx="1340" cy="471" r="1.1" fill="#7ee8f8" style="animation:p2 9s linear 1.7s infinite"/>
  <circle cx="1420" cy="484" r="1.2" fill="#22d3ee" style="animation:p1 6s linear 0.9s infinite"/>
  <circle cx="1480" cy="476" r="1.0" fill="#7ee8f8" style="animation:p3 7.5s linear 3.3s infinite"/>

  <!-- grup 2: medium agak terang -->
  <circle cx="80"   cy="460" r="2.0" fill="#22d3ee" style="animation:p2 7s linear 1.1s infinite;filter:drop-shadow(0 0 3px #22d3ee)"/>
  <circle cx="165"  cy="450" r="1.8" fill="#a5f3fc" style="animation:p3 8s linear 2.4s infinite;filter:drop-shadow(0 0 3px #a5f3fc)"/>
  <circle cx="260"  cy="462" r="2.2" fill="#22d3ee" style="animation:p2 6.5s linear 0.6s infinite;filter:drop-shadow(0 0 3px #22d3ee)"/>
  <circle cx="380"  cy="455" r="1.9" fill="#a5f3fc" style="animation:p5 9s linear 3.1s infinite;filter:drop-shadow(0 0 3px #a5f3fc)"/>
  <circle cx="470"  cy="465" r="2.0" fill="#22d3ee" style="animation:p2 7.5s linear 1.9s infinite;filter:drop-shadow(0 0 3px #22d3ee)"/>
  <circle cx="560"  cy="448" r="1.8" fill="#a5f3fc" style="animation:p3 8.5s linear 4.2s infinite;filter:drop-shadow(0 0 3px #a5f3fc)"/>
  <circle cx="680"  cy="458" r="2.1" fill="#22d3ee" style="animation:p5 7s linear 0.4s infinite;filter:drop-shadow(0 0 3px #22d3ee)"/>
  <circle cx="760"  cy="463" r="1.9" fill="#a5f3fc" style="animation:p2 9s linear 2.9s infinite;filter:drop-shadow(0 0 3px #a5f3fc)"/>
  <circle cx="850"  cy="451" r="2.0" fill="#22d3ee" style="animation:p3 6.5s linear 1.4s infinite;filter:drop-shadow(0 0 3px #22d3ee)"/>
  <circle cx="940"  cy="466" r="1.8" fill="#a5f3fc" style="animation:p5 8s linear 3.7s infinite;filter:drop-shadow(0 0 3px #a5f3fc)"/>
  <circle cx="1060" cy="454" r="2.2" fill="#22d3ee" style="animation:p2 7.5s linear 0.8s infinite;filter:drop-shadow(0 0 3px #22d3ee)"/>
  <circle cx="1150" cy="461" r="1.9" fill="#a5f3fc" style="animation:p3 8s linear 5s infinite;filter:drop-shadow(0 0 3px #a5f3fc)"/>
  <circle cx="1230" cy="449" r="2.0" fill="#22d3ee" style="animation:p5 9s linear 2.1s infinite;filter:drop-shadow(0 0 3px #22d3ee)"/>
  <circle cx="1310" cy="457" r="1.8" fill="#a5f3fc" style="animation:p2 7s linear 1.6s infinite;filter:drop-shadow(0 0 3px #a5f3fc)"/>
  <circle cx="1390" cy="465" r="2.1" fill="#22d3ee" style="animation:p3 6.5s linear 3.8s infinite;filter:drop-shadow(0 0 3px #22d3ee)"/>
  <circle cx="1460" cy="452" r="1.9" fill="#a5f3fc" style="animation:p5 8.5s linear 0.1s infinite;filter:drop-shadow(0 0 3px #a5f3fc)"/>

  <!-- grup 3: bright terang -->
  <circle cx="140"  cy="445" r="1.8" fill="#e0f9ff" style="animation:p4 7s linear 2s infinite;filter:drop-shadow(0 0 4px #e0f9ff)"/>
  <circle cx="320"  cy="438" r="1.6" fill="#22d3ee" style="animation:p4 8s linear 0.3s infinite;filter:drop-shadow(0 0 4px #22d3ee)"/>
  <circle cx="520"  cy="442" r="1.9" fill="#e0f9ff" style="animation:p4 6.5s linear 3.5s infinite;filter:drop-shadow(0 0 4px #e0f9ff)"/>
  <circle cx="740"  cy="436" r="1.7" fill="#22d3ee" style="animation:p4 9s linear 1.1s infinite;filter:drop-shadow(0 0 4px #22d3ee)"/>
  <circle cx="900"  cy="444" r="1.8" fill="#e0f9ff" style="animation:p4 7.5s linear 4.7s infinite;filter:drop-shadow(0 0 4px #e0f9ff)"/>
  <circle cx="1080" cy="439" r="1.6" fill="#22d3ee" style="animation:p4 8.5s linear 0.6s infinite;filter:drop-shadow(0 0 4px #22d3ee)"/>
  <circle cx="1270" cy="443" r="1.9" fill="#e0f9ff" style="animation:p4 7s linear 2.7s infinite;filter:drop-shadow(0 0 4px #e0f9ff)"/>
  <circle cx="1440" cy="437" r="1.7" fill="#22d3ee" style="animation:p4 6s linear 5.2s infinite;filter:drop-shadow(0 0 4px #22d3ee)"/>

  <!-- grup 4: diamond sparks -->
  <rect x="98"  y="460" width="3" height="3" fill="#7ee8f8" transform="rotate(45 98 460)"  style="animation:p3 8s linear 1.3s infinite;filter:drop-shadow(0 0 3px #7ee8f8)"/>
  <rect x="440" y="455" width="3" height="3" fill="#7ee8f8" transform="rotate(45 440 455)" style="animation:p2 7s linear 2.6s infinite;filter:drop-shadow(0 0 3px #7ee8f8)"/>
  <rect x="700" y="462" width="3" height="3" fill="#7ee8f8" transform="rotate(45 700 462)" style="animation:p3 9s linear 0.5s infinite;filter:drop-shadow(0 0 3px #7ee8f8)"/>
  <rect x="1000" y="457" width="3" height="3" fill="#7ee8f8" transform="rotate(45 1000 457)" style="animation:p2 7.5s linear 4s infinite;filter:drop-shadow(0 0 3px #7ee8f8)"/>
  <rect x="1200" cy="460" width="3" height="3" fill="#7ee8f8" transform="rotate(45 1200 460)" style="animation:p3 8.5s linear 1.8s infinite;filter:drop-shadow(0 0 3px #7ee8f8)"/>
  <rect x="1450" y="455" width="3" height="3" fill="#7ee8f8" transform="rotate(45 1450 455)" style="animation:p2 6.5s linear 3.2s infinite;filter:drop-shadow(0 0 3px #7ee8f8)"/>

  <!-- extra scattered -->
  <circle cx="30"   cy="440" r="1.0" fill="#22d3ee" style="animation:p1 7s linear 2.3s infinite"/>
  <circle cx="610"  cy="435" r="1.1" fill="#7ee8f8" style="animation:p2 8s linear 0.9s infinite"/>
  <circle cx="1130" cy="443" r="1.0" fill="#22d3ee" style="animation:p3 6.5s linear 4.4s infinite"/>
  <circle cx="1380" cy="430" r="1.2" fill="#7ee8f8" style="animation:p1 7.5s linear 1.5s infinite"/>

  <!-- glitch layers -->
  <text class="glitch1 g1anim" x="750" y="300">ZEENN</text>
  <text class="glitch2 g2anim" x="750" y="300">ZEENN</text>

  <!-- welcome to label -->
  <text class="lbl" x="750" y="165">— welcome to —</text>

  <!-- ZEENN per huruf bounce -->
  <g fill="url(#textGrad)" font-family="'Orbitron',sans-serif" font-size="130" font-weight="900" letter-spacing="20" text-anchor="middle">
    <text class="l1" x="540"  y="305">Z</text>
    <text class="l2" x="633"  y="305">E</text>
    <text class="l3" x="726"  y="305">E</text>
    <text class="l4" x="819"  y="305">N</text>
    <text class="l5" x="912"  y="305">N</text>
  </g>

  <!-- divider line -->
  <line class="divline" x1="550" y1="340" x2="950" y2="340" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- PROFILE per huruf bounce -->
  <g fill="none" stroke="rgba(148,163,184,0.65)" stroke-width="0.8" font-family="'Orbitron',sans-serif" font-size="22" font-weight="400" letter-spacing="14" text-anchor="middle">
    <text class="s1" x="638"  y="375">P</text>
    <text class="s2" x="660"  y="375">R</text>
    <text class="s3" x="682"  y="375">O</text>
    <text class="s4" x="704"  y="375">F</text>
    <text class="s5" x="726"  y="375">I</text>
    <text class="s6" x="748"  y="375">L</text>
    <text class="s7" x="770"  y="375">E</text>
  </g>

</svg>
