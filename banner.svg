<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
      
      .bg { fill: #030014; }
      .grid-line { stroke: rgba(34, 211, 238, 0.15); stroke-width: 0.8; }
      
      @keyframes fadeGlow {
        0% { opacity: 0; transform: translateY(30px); filter: blur(8px); }
        100% { opacity: 1; transform: translateY(0); filter: blur(0); }
      }
      
      @keyframes bounce3d {
        0%, 100% { transform: translateY(0px) scale(1); text-shadow: 0 0 5px #22d3ee, 0 0 10px #22d3ee; }
        50% { transform: translateY(-15px) scale(1.05); text-shadow: 0 0 20px #22d3ee, 0 0 30px #0ea5e9; }
      }
      
      @keyframes bounceSmall {
        0%, 100% { transform: translateY(0px); text-shadow: 0 0 2px #22d3ee; }
        50% { transform: translateY(-8px); text-shadow: 0 0 12px #22d3ee; }
      }
      
      @keyframes pulseBorder {
        0%, 100% { stroke-width: 1.5; stroke-opacity: 0.5; }
        50% { stroke-width: 3; stroke-opacity: 1; filter: drop-shadow(0 0 12px #22d3ee); }
      }
      
      @keyframes glitchEffect {
        0%, 85%, 100% { opacity: 0; transform: translate(0,0); }
        86% { opacity: 0.7; transform: translate(-5px, -2px); fill: #ff3366; }
        88% { opacity: 0; }
        90% { opacity: 0.6; transform: translate(5px, 2px); fill: #33ffcc; }
        92% { opacity: 0; }
        94% { opacity: 0.4; transform: translate(-2px, 1px); fill: #ffcc33; }
        96% { opacity: 0; }
      }
      
      @keyframes floatParticle {
        0% { transform: translateY(0) translateX(0); opacity: 0; }
        20% { opacity: 0.8; }
        80% { opacity: 0.6; }
        100% { transform: translateY(-400px) translateX(var(--dx, 0px)); opacity: 0; }
      }
      
      @keyframes scanHorizontal {
        0% { transform: translateX(-100%); opacity: 0; }
        10% { opacity: 0.4; }
        90% { opacity: 0.4; }
        100% { transform: translateX(100%); opacity: 0; }
      }
      
      @keyframes rotateCorner {
        0%, 100% { stroke-dashoffset: 0; }
        50% { stroke-dashoffset: 20; }
      }
      
      .fade-up { animation: fadeGlow 0.8s ease forwards; }
      .bounce-letter { animation: bounce3d 2.4s ease-in-out infinite; }
      .bounce-profile { animation: bounceSmall 2.2s ease-in-out infinite; }
      .glitch-layer { animation: glitchEffect 4s infinite; opacity: 0; }
      .particle-up { animation: floatParticle 6s linear infinite; }
      .scan-line { animation: scanHorizontal 5s ease-in-out infinite; }
      .corner-path { animation: rotateCorner 3s ease-in-out infinite; }
      
      .z-delay { animation-delay: 0s; }
      .e1-delay { animation-delay: 0.1s; }
      .e2-delay { animation-delay: 0.2s; }
      .n1-delay { animation-delay: 0.3s; }
      .n2-delay { animation-delay: 0.4s; }
      
      .p1-delay { animation-delay: 0.05s; }
      .p2-delay { animation-delay: 0.12s; }
      .p3-delay { animation-delay: 0.19s; }
      .p4-delay { animation-delay: 0.26s; }
      .p5-delay { animation-delay: 0.33s; }
      .p6-delay { animation-delay: 0.40s; }
      .p7-delay { animation-delay: 0.47s; }
    </style>
    
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#aaffff"/>
      <stop offset="60%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e6b8f"/>
    </linearGradient>
    
    <linearGradient id="neonGradGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffaa33"/>
      <stop offset="50%" stop-color="#ffdd88"/>
      <stop offset="100%" stop-color="#ffaa33"/>
    </linearGradient>
    
    <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(34,211,238,0)"/>
      <stop offset="20%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#7ee8ff"/>
      <stop offset="80%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0)"/>
    </linearGradient>
    
    <linearGradient id="profileGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7ee8ff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(34,211,238,0.08)"/>
      <stop offset="70%" stop-color="rgba(34,211,238,0.02)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    
    <filter id="strongGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feMerge>
        <feMergeNode in="offsetblur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="1500" height="500" fill="#030014"/>
  <rect width="1500" height="500" fill="url(#bgGlow)"/>
  
  <!-- Grid sistem -->
  <g>
    <line class="grid-line" x1="0" y1="35" x2="1500" y2="35"/>
    <line class="grid-line" x1="0" y1="70" x2="1500" y2="70"/>
    <line class="grid-line" x1="0" y1="105" x2="1500" y2="105"/>
    <line class="grid-line" x1="0" y1="140" x2="1500" y2="140"/>
    <line class="grid-line" x1="0" y1="175" x2="1500" y2="175"/>
    <line class="grid-line" x1="0" y1="210" x2="1500" y2="210"/>
    <line class="grid-line" x1="0" y1="245" x2="1500" y2="245"/>
    <line class="grid-line" x1="0" y1="280" x2="1500" y2="280"/>
    <line class="grid-line" x1="0" y1="315" x2="1500" y2="315"/>
    <line class="grid-line" x1="0" y1="350" x2="1500" y2="350"/>
    <line class="grid-line" x1="0" y1="385" x2="1500" y2="385"/>
    <line class="grid-line" x1="0" y1="420" x2="1500" y2="420"/>
    <line class="grid-line" x1="0" y1="455" x2="1500" y2="455"/>
    <line class="grid-line" x1="0" y1="490" x2="1500" y2="490"/>
  </g>
  <g>
    <line class="grid-line" x1="35" y1="0" x2="35" y2="500"/>
    <line class="grid-line" x1="70" y1="0" x2="70" y2="500"/>
    <line class="grid-line" x1="105" y1="0" x2="105" y2="500"/>
    <line class="grid-line" x1="140" y1="0" x2="140" y2="500"/>
    <line class="grid-line" x1="175" y1="0" x2="175" y2="500"/>
    <line class="grid-line" x1="210" y1="0" x2="210" y2="500"/>
    <line class="grid-line" x1="245" y1="0" x2="245" y2="500"/>
    <line class="grid-line" x1="280" y1="0" x2="280" y2="500"/>
    <line class="grid-line" x1="315" y1="0" x2="315" y2="500"/>
    <line class="grid-line" x1="350" y1="0" x2="350" y2="500"/>
    <line class="grid-line" x1="385" y1="0" x2="385" y2="500"/>
    <line class="grid-line" x1="420" y1="0" x2="420" y2="500"/>
    <line class="grid-line" x1="455" y1="0" x2="455" y2="500"/>
    <line class="grid-line" x1="490" y1="0" x2="490" y2="500"/>
    <line class="grid-line" x1="525" y1="0" x2="525" y2="500"/>
    <line class="grid-line" x1="560" y1="0" x2="560" y2="500"/>
    <line class="grid-line" x1="595" y1="0" x2="595" y2="500"/>
    <line class="grid-line" x1="630" y1="0" x2="630" y2="500"/>
    <line class="grid-line" x1="665" y1="0" x2="665" y2="500"/>
    <line class="grid-line" x1="700" y1="0" x2="700" y2="500"/>
    <line class="grid-line" x1="735" y1="0" x2="735" y2="500"/>
    <line class="grid-line" x1="770" y1="0" x2="770" y2="500"/>
    <line class="grid-line" x1="805" y1="0" x2="805" y2="500"/>
    <line class="grid-line" x1="840" y1="0" x2="840" y2="500"/>
    <line class="grid-line" x1="875" y1="0" x2="875" y2="500"/>
    <line class="grid-line" x1="910" y1="0" x2="910" y2="500"/>
    <line class="grid-line" x1="945" y1="0" x2="945" y2="500"/>
    <line class="grid-line" x1="980" y1="0" x2="980" y2="500"/>
    <line class="grid-line" x1="1015" y1="0" x2="1015" y2="500"/>
    <line class="grid-line" x1="1050" y1="0" x2="1050" y2="500"/>
    <line class="grid-line" x1="1085" y1="0" x2="1085" y2="500"/>
    <line class="grid-line" x1="1120" y1="0" x2="1120" y2="500"/>
    <line class="grid-line" x1="1155" y1="0" x2="1155" y2="500"/>
    <line class="grid-line" x1="1190" y1="0" x2="1190" y2="500"/>
    <line class="grid-line" x1="1225" y1="0" x2="1225" y2="500"/>
    <line class="grid-line" x1="1260" y1="0" x2="1260" y2="500"/>
    <line class="grid-line" x1="1295" y1="0" x2="1295" y2="500"/>
    <line class="grid-line" x1="1330" y1="0" x2="1330" y2="500"/>
    <line class="grid-line" x1="1365" y1="0" x2="1365" y2="500"/>
    <line class="grid-line" x1="1400" y1="0" x2="1400" y2="500"/>
    <line class="grid-line" x1="1435" y1="0" x2="1435" y2="500"/>
    <line class="grid-line" x1="1470" y1="0" x2="1470" y2="500"/>
  </g>
  
  <!-- Corner accents -->
  <path d="M22 22 L70 22 M22 22 L22 70" stroke="#22d3ee" stroke-width="1.8" fill="none" class="corner-path"/>
  <path d="M1478 22 L1430 22 M1478 22 L1478 70" stroke="#22d3ee" stroke-width="1.8" fill="none" class="corner-path"/>
  <path d="M22 478 L70 478 M22 478 L22 430" stroke="#22d3ee" stroke-width="1.8" fill="none" class="corner-path"/>
  <path d="M1478 478 L1430 478 M1478 478 L1478 430" stroke="#22d3ee" stroke-width="1.8" fill="none" class="corner-path"/>
  
  <!-- Scanline -->
  <rect class="scan-line" x="-100" y="240" width="1700" height="3" fill="rgba(34,211,238,0.3)">
    <animate attributeName="y" values="150;350;150" dur="8s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Floating particles -->
  <circle cx="45" cy="470" r="1.5" fill="#22d3ee" class="particle-up" style="--dx: -15px; animation-delay: 0s;"/>
  <circle cx="125" cy="485" r="1.2" fill="#7ee8ff" class="particle-up" style="--dx: 10px; animation-delay: 0.6s;"/>
  <circle cx="205" cy="455" r="1.6" fill="#22d3ee" class="particle-up" style="--dx: -8px; animation-delay: 1.2s;"/>
  <circle cx="285" cy="475" r="1.3" fill="#7ee8ff" class="particle-up" style="--dx: 12px; animation-delay: 1.8s;"/>
  <circle cx="365" cy="490" r="1.4" fill="#22d3ee" class="particle-up" style="--dx: -10px; animation-delay: 2.4s;"/>
  <circle cx="445" cy="460" r="1.2" fill="#7ee8ff" class="particle-up" style="--dx: 8px; animation-delay: 3s;"/>
  <circle cx="525" cy="480" r="1.5" fill="#22d3ee" class="particle-up" style="--dx: -12px; animation-delay: 3.6s;"/>
  <circle cx="605" cy="465" r="1.3" fill="#7ee8ff" class="particle-up" style="--dx: 9px; animation-delay: 4.2s;"/>
  <circle cx="685" cy="495" r="1.4" fill="#22d3ee" class="particle-up" style="--dx: -7px; animation-delay: 4.8s;"/>
  <circle cx="765" cy="450" r="1.2" fill="#7ee8ff" class="particle-up" style="--dx: 11px; animation-delay: 5.4s;"/>
  <circle cx="845" cy="478" r="1.5" fill="#22d3ee" class="particle-up" style="--dx: -9px; animation-delay: 0.3s;"/>
  <circle cx="925" cy="468" r="1.3" fill="#7ee8ff" class="particle-up" style="--dx: 7px; animation-delay: 0.9s;"/>
  <circle cx="1005" cy="492" r="1.4" fill="#22d3ee" class="particle-up" style="--dx: -13px; animation-delay: 1.5s;"/>
  <circle cx="1085" cy="458" r="1.2" fill="#7ee8ff" class="particle-up" style="--dx: 10px; animation-delay: 2.1s;"/>
  <circle cx="1165" cy="485" r="1.5" fill="#22d3ee" class="particle-up" style="--dx: -6px; animation-delay: 2.7s;"/>
  <circle cx="1245" cy="472" r="1.3" fill="#7ee8ff" class="particle-up" style="--dx: 14px; animation-delay: 3.3s;"/>
  <circle cx="1325" cy="462" r="1.4" fill="#22d3ee" class="particle-up" style="--dx: -11px; animation-delay: 3.9s;"/>
  <circle cx="1405" cy="488" r="1.2" fill="#7ee8ff" class="particle-up" style="--dx: 8px; animation-delay: 4.5s;"/>
  <circle cx="1485" cy="455" r="1.5" fill="#22d3ee" class="particle-up" style="--dx: -9px; animation-delay: 5.1s;"/>
  
  <!-- Bright glowing particles -->
  <circle cx="75" cy="430" r="2" fill="#aaffff" class="particle-up" style="--dx: -5px; animation-delay: 0.2s; filter: drop-shadow(0 0 4px #22d3ee);"/>
  <circle cx="255" cy="415" r="1.8" fill="#22d3ee" class="particle-up" style="--dx: 6px; animation-delay: 1.1s; filter: drop-shadow(0 0 4px #22d3ee);"/>
  <circle cx="435" cy="440" r="2.2" fill="#aaffff" class="particle-up" style="--dx: -8px; animation-delay: 2s; filter: drop-shadow(0 0 4px #22d3ee);"/>
  <circle cx="615" cy="420" r="1.9" fill="#22d3ee" class="particle-up" style="--dx: 7px; animation-delay: 2.9s; filter: drop-shadow(0 0 4px #22d3ee);"/>
  <circle cx="795" cy="435" r="2" fill="#aaffff" class="particle-up" style="--dx: -4px; animation-delay: 3.8s; filter: drop-shadow(0 0 4px #22d3ee);"/>
  <circle cx="975" cy="410" r="1.8" fill="#22d3ee" class="particle-up" style="--dx: 9px; animation-delay: 4.7s; filter: drop-shadow(0 0 4px #22d3ee);"/>
  <circle cx="1155" cy="445" r="2.1" fill="#aaffff" class="particle-up" style="--dx: -6px; animation-delay: 5.6s; filter: drop-shadow(0 0 4px #22d3ee);"/>
  <circle cx="1335" cy="425" r="1.9" fill="#22d3ee" class="particle-up" style="--dx: 5px; animation-delay: 0.5s; filter: drop-shadow(0 0 4px #22d3ee);"/>
  
  <!-- Glitch effect layers -->
  <text class="glitch-layer" x="750" y="290" fill="#ff3366" font-family="Orbitron" font-size="125" font-weight="900" text-anchor="middle" letter-spacing="18">ZEENN</text>
  <text class="glitch-layer" x="750" y="290" fill="#33ffcc" font-family="Orbitron" font-size="125" font-weight="900" text-anchor="middle" letter-spacing="18" style="animation-delay: 0.1s;">ZEENN</text>
  
  <!-- WELCOME TEXT -->
  <text x="750" y="70" fill="url(#neonGradGold)" font-family="Orbitron" font-size="32" font-weight="700" text-anchor="middle" letter-spacing="6" class="fade-up" style="animation-delay: 0.1s;">⚡ W E L C O M E ⚡</text>
  
  <!-- TO text -->
  <text x="750" y="115" fill="#22d3ee" font-family="Share Tech Mono" font-size="20" text-anchor="middle" letter-spacing="4" class="fade-up" style="animation-delay: 0.3s;" opacity="0.9">▸ T O ▸</text>
  
  <!-- Divider line atas -->
  <line x1="550" y1="145" x2="950" y2="145" stroke="url(#lineGlow)" stroke-width="2">
    <animate attributeName="stroke-width" values="2;3;2" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- Main title ZEENN dengan bouncing effect -->
  <g font-family="Orbitron" font-size="140" font-weight="900" text-anchor="middle">
    <text x="540" y="300" fill="url(#neonGrad)" class="bounce-letter z-delay">Z</text>
    <text x="633" y="300" fill="url(#neonGrad)" class="bounce-letter e1-delay">E</text>
    <text x="726" y="300" fill="url(#neonGrad)" class="bounce-letter e2-delay">E</text>
    <text x="819" y="300" fill="url(#neonGrad)" class="bounce-letter n1-delay">N</text>
    <text x="912" y="300" fill="url(#neonGrad)" class="bounce-letter n2-delay">N</text>
  </g>
  
  <!-- Decorative circles around ZEENN -->
