  <text x="750" y="480" fill="#22d3ee" font-family="Share Tech Mono" font-size="10" text-anchor="middle" letter-spacing="1">● SYSTEM ONLINE ● PROFILE ACTIVE ● V.2.5.1 ●</text>
  
  <!-- Decorative corner elements -->
  <rect x="45" y="455" width="3" height="3" fill="#22d3ee" opacity="0.6">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="1452" y="455" width="3" height="3" fill="#22d3ee" opacity="0.6">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
  </rect>
  <rect x="45" y="42" width="3" height="3" fill="#22d3ee" opacity="0.6">
